document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

{ primaryHov }}\">\n      <i data-lucide=\"plus\" style=\"width:16px; height:16px;\"><\u002Fi>Add contact\n    <\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- table -->\n  <div class=\"card\" style=\"flex:1; min-height:0; display:flex; flex-direction:column; overflow:hidden;\">\n    <!-- header row -->\n    <div style=\"display:grid; grid-template-columns:38px 2.3fr 1.1fr 1.6fr 1.1fr 1fr 1.3fr; align-items:center; padding:0 18px; height:46px; border-bottom:1px solid #f1f0f7; background:rgba(251,251,254,0.7);\">\n      <div style=\"display:flex; align-items:center;\"><span style=\"width:16px; height:16px; border:1.5px solid #d4d2e3; border-radius:5px;\"><\u002Fspan><\u002Fdiv>\n      <div class=\"eb\">Contact name<\u002Fdiv>\n      <div class=\"eb\">Phone<\u002Fdiv>\n      <div class=\"eb\">Email<\u002Fdiv>\n      <div class=\"eb\">Created<\u002Fdiv>\n      <div class=\"eb\">Last activity<\u002Fdiv>\n      <div class=\"eb\">Tags<\u002Fdiv>\n    <\u002Fdiv>\n    <!-- rows -->\n    <div class=\"scroll\" style=\"flex:1; overflow-y:auto;\">\n      <sc-for list=\"{{ contacts }}\" as=\"c\" hint-placeholder-count=\"14\">\n        <div style=\"display:grid; grid-template-columns:38px 2.3fr 1.1fr 1.6fr 1.1fr 1fr 1.3fr; align-items:center; padding:0 18px; height:58px; border-bottom:1px solid #f4f3fa; cursor:pointer;\" style-hover=\"{{ rowHov }}\">\n          <div style=\"display:flex; align-items:center;\"><span style=\"width:16px; height:16px; border:1.5px solid #d4d2e3; border-radius:5px;\"><\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:8px; min-width:0; overflow:hidden;\">\n            <span style=\"font-size:13.5px; font-weight:600; color:#1b1a2e; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:0 1 auto;\">{{ c.name }}<\u002Fspan>\n            <sc-if value=\"{{ c.actionRequired }}\" hint-placeholder-val=\"{{ false }}\">\n              <span title=\"{{ c.actionReason }}\" style=\"display:inline-flex; align-items:center; gap:4px; padding:2px 9px; border-radius:9999px; background:#fdecea; color:#d6447a; font-size:10.5px; font-weight:700; white-space:nowrap; flex-shrink:0; cursor:default;\">\n                <i data-lucide=\"circle-alert\" style=\"width:11px; height:11px;\"><\u002Fi>Action required\n              <\u002Fspan>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <div class=\"n\" style=\"font-size:13px; color:#56567a; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ c.phone }}<\u002Fdiv>\n          <div style=\"font-size:13px; color:#56567a; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ c.email }}<\u002Fdiv>\n          <div class=\"n\" style=\"font-size:12.5px; color:#8b889f; white-space:nowrap;\">{{ c.created }}<\u002Fdiv>\n          <div style=\"font-size:12.5px; color:#8b889f; white-space:nowrap;\">{{ c.activity }}<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:5px; min-width:0;\">\n            <sc-for list=\"{{ c.tags }}\" as=\"t\" hint-placeholder-count=\"2\">\n              <span style=\"{{ t.style }}\">{{ t.label }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fmain>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1400,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = { segment:'active', filtersOpen:false, filters:{ booked:'any', date:'any', campaign:[], engagement:[], info:[] } };\n  componentDidMount() { this._icons(); }\n  componentDidUpdate() { this._icons(); }\n  _icons() { if (window.lucide && window.lucide.createIcons) requestAnimationFrame(() => window.lucide.createIcons()); }\n\n  initials(name) {\n    const parts = name.replace(/[^a-zA-Z ]/g, '').trim().split(/\\s+/).filter(Boolean);\n    if (!parts.length) return '?';\n    return (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();\n  }\n\n  renderVals() {\n    const avatars = [\n      ['#e7f4ee','#16a36a'], ['#fbf0db','#cd8916'], ['#f1eefe','#6c65ea'],\n      ['#fdecea','#d6447a'], ['#e8f1fd','#2f6fd4'], ['#f3f2f9','#56567a'],\n    ];\n    const tagStyles = {\n      ai: { bg:'#f1eefe', fg:'#6c65ea' },\n      money: { bg:'#e7f4ee', fg:'#16a36a' },\n      plus: { bg:'#f3f2f9', fg:'#8b889f' },\n    };\n    const tag = (label, kind) => {\n      const c = tagStyles[kind] || tagStyles.plus;\n      return { label, kind, style: { display:'inline-flex', alignItems:'center', padding:'3px 9px', borderRadius:'9999px', background:c.bg, color:c.fg, fontSize:'11px', fontWeight:600, whiteSpace:'nowrap' } };\n    };\n\n    const raw = [\n      { name:'Kim Oake', phone:'(214) 282-2760', email:'kimoake@me.com', created:'Jun 25, 2026', activity:'48 min ago', tags:[tag('ai engaged','ai'),tag('+1','plus')] },\n      { name:'Shivani Patel', phone:'(973) 223-1217', email:'shivaniixox@gmail.com', created:'Jun 25, 2026', activity:'3 hours ago', tags:[tag('ai engaged','ai'),tag('+1','plus')] },\n      { name:'Pam Miller', phone:'(913) 269-0381', email:'pamm3811@gmail.com', created:'Jun 24, 2026', activity:'4 hours ago', tags:[tag('$179 tox','money')] },\n      { name:'Jacqualyn Correro', phone:'(214) 542-9518', email:'jacqicorrero@gmail.com', created:'Jun 24, 2026', activity:'41 min ago', tags:[tag('ai engaged','ai'),tag('+1','plus')] },\n      { name:'Rickey Booth', phone:'(601) 745-3770', email:'rickyleebooth72@gmail.com', created:'Jun 24, 2026', activity:'3 hours ago', tags:[tag('ai engaged','ai'),tag('+1','plus')] },\n      { name:'Ciara Alexander', phone:'(504) 949-5568', email:'zcmyles@gmail.com', created:'Jun 24, 2026', activity:'1 day ago', tags:[tag('$179 tox','money')] },\n      { name:'Cristiana Sistimini', phone:'', email:'', created:'Jun 24, 2026', activity:'1 day ago', tags:[] },\n      { name:'Luis Sanchez', phone:'(972) 922-9378', email:'luis.sanchez.febres@gmail.com', created:'Jun 24, 2026', activity:'4 hours ago', tags:[tag('ai engaged','ai'),tag('+1','plus')] },\n      { name:'Sue Conn', phone:'(214) 799-3211', email:'smcdenton@gmail.com', created:'Jun 24, 2026', activity:'4 hours ago', tags:[tag('ai engaged','ai'),tag('+1','plus')] },\n      { name:'Hayley Handmade', phone:'', email:'', created:'Jun 23, 2026', activity:'1 day ago', tags:[] },\n      { name:'Hiren Shah', phone:'', email:'', created:'Jun 23, 2026', activity:'1 day ago', tags:[] },\n      { name:'Hannah Adams', phone:'(214) 442-3742', email:'hannah.j.harris1@gmail.com', created:'Jun 23, 2026', activity:'1 day ago', tags:[tag('$179 tox','money')] },\n      { name:'Megan Torres', phone:'(469) 555-0182', email:'megan.torres@gmail.com', created:'Jun 23, 2026', activity:'2 days ago', tags:[tag('ai engaged','ai')] },\n      { name:'Brittany Cole', phone:'(817) 555-7741', email:'brittcole@gmail.com', created:'Jun 22, 2026', activity:'2 days ago', tags:[tag('$450 laser','money')] },\n      { name:'Olivia Reyes', phone:'(214) 555-3390', email:'olivia.reyes@me.com', created:'Jun 22, 2026', activity:'3 days ago', tags:[tag('ai engaged','ai'),tag('+1','plus')] },\n      { name:'Derek Nguyen', phone:'(972) 555-6628', email:'dnguyen@gmail.com', created:'Jun 21, 2026', activity:'3 days ago', tags:[] },\n    ];\n\n    // only the first 6 tagged contacts are \"active\"; everyone else is inactive\n    const activeNames = raw.filter(c => c.tags.length > 0).slice(0, 6).map(c => c.name);\n    const actionReasons = { 'Kim Oake':'Awaiting response', 'Jacqualyn Correro':'Needs a call', 'Ciara Alexander':'Booking unconfirmed' };\n    const actionNames = Object.keys(actionReasons);\n    let mapped = raw.map((c, i) => {\n      const [avBg, avFg] = avatars[i % avatars.length];\n      const active = activeNames.includes(c.name);\n      // inactive contacts shouldn't carry AI-engaged / +1 tags\n      const tags = active ? c.tags : c.tags.filter(t => t.kind === 'money');\n      return { ...c, active, tags, actionRequired: active && actionNames.includes(c.name), actionReason: actionReasons[c.name] || '', initials: this.initials(c.name), avBg, avFg, email: c.email || '—', phone: c.phone || '—' };\n    });\n\n    const seg = this.state.segment;\n    const activeList = mapped.filter(c => c.active);\n    const contacts = seg === 'active' ? activeList : mapped;\n    const counts = { active: activeList.length, all: 755 };\n\n    const segDefs = [{ id:'active', label:'Active contacts' }, { id:'all', label:'All contacts' }];\n    const segments = segDefs.map(s => {\n      const on = seg === s.id;\n      const style = { padding:'6px 14px', border:'none', borderRadius:'8px', fontFamily:'inherit', fontSize:'13px', fontWeight:600, cursor:'pointer', whiteSpace:'nowrap', transition:'all .15s ease', background: on ? '#fff' : 'transparent', color: on ? '#1b1a2e' : '#6e6b86', boxShadow: on ? '0 1px 2px rgba(27,26,46,.1)' : 'none' };\n      return { ...s, style, onClick: () => this.setState({ segment: s.id }) };\n    });\n\n    // --- Filters ---\n    const f = this.state.filters;\n    const chipStyle = (on) => ({ padding:'6px 12px', border:'1px solid ' + (on ? '#6c65ea' : '#e6e5f1'), borderRadius:'9999px', background: on ? '#f1eefe' : '#fff', color: on ? '#6c65ea' : '#56567a', fontFamily:'inherit', fontSize:'12.5px', fontWeight:600, cursor:'pointer', transition:'all .12s ease', whiteSpace:'nowrap' });\n    const setSingle = (key, val) => this.setState(s => ({ filters: { ...s.filters, [key]: s.filters[key] === val ? 'any' : val } }));\n    const toggleMulti = (key, val) => this.setState(s => {\n      const arr = s.filters[key];\n      const next = arr.includes(val) ? arr.filter(x => x !== val) : [...arr, val];\n      return { filters: { ...s.filters, [key]: next } };\n    });\n    const groupDefs = [\n      { key:'booked', label:'Booking status', multi:false, opts:['Booked','Not booked','Booked + showed','No-show'] },\n      { key:'campaign', label:'Campaign tag', multi:true, opts:['Spring Botox','HydraFacial','Lip filler','Grand opening','Booster','Weight loss'] },\n      { key:'date', label:'Created', multi:false, opts:['Last 7 days','Last 30 days','Last 90 days','This year'] },\n      { key:'engagement', label:'AI engagement', multi:true, opts:['AI engaged','Replied','No reply yet','Opted out'] },\n      { key:'info', label:'Contact info', multi:true, opts:['Has phone','Has email','Missing info'] },\n    ];\n    const filterGroups = groupDefs.map(g => ({\n      label: g.label,\n      chips: g.opts.map(o => {\n        const on = g.multi ? f[g.key].includes(o) : f[g.key] === o;\n        return { label:o, style: chipStyle(on), onClick: () => g.multi ? toggleMulti(g.key, o) : setSingle(g.key, o) };\n      }),\n    }));\n    const filterCount = groupDefs.reduce((n, g) => n + (g.multi ? f[g.key].length : (f[g.key] !== 'any' ? 1 : 0)), 0);\n\n    return {\n      contacts, segments,\n      countLabel: seg === 'active' ? `${counts.active} active` : `${counts.all} contacts`,\n      filtersOpen: this.state.filtersOpen,\n      toggleFilters: () => this.setState(s => ({ filtersOpen: !s.filtersOpen })),\n      closeFilters: () => this.setState({ filtersOpen:false }),\n      clearFilters: () => this.setState({ filters:{ booked:'any', date:'any', campaign:[], engagement:[], info:[] } }),\n      filterGroups, filterCount, hasFilters: filterCount > 0,\n      filterBtnStyle: (() => {\n        const s = { display:'inline-flex', alignItems:'center', gap:'6px', padding:'8px 13px', border:'1px solid ' + (this.state.filtersOpen || filterCount ? '#d9d4fb' : '#e6e5f1'), borderRadius:'10px', background: this.state.filtersOpen ? '#f6f4fe' : 'rgba(255,255,255,0.9)', fontFamily:'inherit', fontSize:'13px', fontWeight:600, color:'#3a3756', cursor:'pointer' };\n        return s;\n      })(),\n      filterIconColor: this.state.filtersOpen || filterCount ? '#6c65ea' : '#6e6b86',\n      primaryHov: { transform:'translateY(-1px)', boxShadow:'0 6px 24px rgba(108,101,234,.45)' },\n      ghostHov: { background:'rgba(245,245,250,0.95)', borderColor:'#d9d4fb' },\n      rowHov: { background:'rgba(108,101,234,0.04)' },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
